name: Build SHADOW APK

on:
  push:
    branches:
      - main
      - apk-release-*
    paths:
      - 'shadow-apk/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: ✅ Make gradlew executable
        working-directory: shadow-apk
        run: chmod +x ./gradlew

      - name: 🏗️ Build debug APK
        working-directory: shadow-apk
        run: ./gradlew assembleDebug --stacktrace

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shadow-debug-apk
          path: shadow-apk/app/build/outputs/apk/debug/
          retention-days: 30
