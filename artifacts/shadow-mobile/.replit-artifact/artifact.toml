kind = "mobile"
previewPath = "/mobile/"
title = "SHADOW Mobile App"
version = "1.0.0"
id = "artifacts/shadow-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 26166

[services.development]
run = "pnpm --filter @workspace/shadow-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadow-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/shadow-mobile", "run", "serve" ]

[services.env]
PORT = "26166"
BASE_PATH = "/mobile/"
