kind = "web"
previewPath = "/"
title = "SHADOW — Android AI Assistant"
version = "1.0.0"
id = "artifacts/shadow-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20227

[services.development]
run = "pnpm --filter @workspace/shadow-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadow-web", "run", "build" ]
publicDir = "artifacts/shadow-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20227"
BASE_PATH = "/"
